<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page Not Found | Outlaw Intelligence</title>
  <meta name="description" content="Outlaw Intelligence's page-not-found experience and navigation back to the main website.">
  <style>
    :root { color-scheme: dark; --bg:#05080d; --panel:#0d1520; --text:#f4f8fb; --muted:#aab6c6; --cyan:#10d8ec; --line:rgba(255,255,255,.14); }
    * { box-sizing: border-box; }
    body { margin:0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: radial-gradient(circle at top left, rgba(16,216,236,.14), transparent 32rem), var(--bg); color:var(--text); line-height:1.65; }
    main { width:min(920px, calc(100% - 32px)); margin:0 auto; padding:64px 0 80px; }
    a { color:var(--cyan); }
    .brand { display:inline-flex; align-items:center; gap:12px; color:var(--text); text-decoration:none; font-weight:900; margin-bottom:40px; }
    .mark { width:42px; height:42px; border:1px solid var(--line); border-radius:12px; display:grid; place-items:center; background:rgba(255,255,255,.05); }
    h1 { font-size:clamp(2.3rem, 6vw, 4.2rem); line-height:.95; letter-spacing:-.055em; margin:0 0 20px; }
    h2 { margin-top:42px; font-size:1.45rem; }
    p, li { color:var(--muted); }
    .panel { border:1px solid var(--line); border-radius:24px; padding:28px; background:rgba(255,255,255,.055); box-shadow:0 22px 70px rgba(0,0,0,.28); }
    .updated { color:var(--muted); margin-bottom:28px; }
  </style>
</head>
<body>
  <main>
    <a class="brand" href="index.html"><span class="mark">OI</span><span>Outlaw Intelligence</span></a>
    <article class="panel">
      <h1>Page Not Found</h1>
<p class="updated">The page you requested is not available.</p>
<p>Head back to the main website audit page and use the contact form if you need help.</p>
<p><a href="index.html">Return to Outlaw Intelligence</a></p>
    </article>
  </main>
</body>
</html>
